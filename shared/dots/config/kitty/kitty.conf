font_size 16.0
hide_window_decorations titlebar-only
macos_show_window_title_in window
tab_bar_style powerline
tab_powerline_style round

# New windows inherit the current working directory
map kitty_mod+enter launch --cwd=current

# Splits keybindings (work in the splits layout)
map kitty_mod+minus launch --location=hsplit --cwd=current
map kitty_mod+backslash launch --location=vsplit --cwd=current

# Directional navigation between windows (opt+hjkl)
map alt+h neighboring_window left
map alt+j neighboring_window down
map alt+k neighboring_window up
map alt+l neighboring_window right

# Nord theme
foreground            #D8DEE9
background            #2E3440
selection_foreground  #000000
selection_background  #FFFACD
url_color             #0087BD
cursor                #81A1C1

